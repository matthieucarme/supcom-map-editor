name: Release

# Fires whenever a tag matching v* is pushed (e.g. `git tag v1.0.0 && git push --tags`). Builds
# self-contained binaries for Windows + Linux, packages the Linux one as an AppImage, then
# attaches both to a fresh GitHub Release.

on:
  push:
    tags:
      - 'v*'
  # Lets you re-run from the Actions tab without a new tag (uses the tag selected in the UI).
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to upload assets to a release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish (win-x64 self-contained)
        run: dotnet publish src/SupremeCommanderEditor.App -p:PublishProfile=win-x64
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src/SupremeCommanderEditor.App/bin/publish/win-x64/SupremeCommanderMapEditor.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish (linux-x64 self-contained)
        run: dotnet publish src/SupremeCommanderEditor.App -p:PublishProfile=linux-x64
      - name: Package AppImage
        # appimagetool needs FUSE OR --appimage-extract-and-run; the script already passes the
        # flag so it works on GH-hosted runners which don't expose /dev/fuse.
        run: bash tools/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: src/SupremeCommanderEditor.App/bin/publish/linux-x64/SupremeCommanderMapEditor-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: ./release-assets
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: ./release-assets
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generated release notes from the commits since the previous tag.
          generate_release_notes: true
          files: |
            release-assets/SupremeCommanderMapEditor.zip
            release-assets/SupremeCommanderMapEditor-x86_64.AppImage
